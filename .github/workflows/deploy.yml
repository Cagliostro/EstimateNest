name: Deploy

on:
  push:
    branches:
      - main
      - development
  pull_request:
    branches:
      - main
      - development

env:
  NODE_VERSION: 24
  AWS_REGION: eu-central-1

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      ROLLUP_NATIVE: 0
      NODE_OPTIONS: --max-old-space-size=4096
      npm_config_optional: true
      SHARP_IGNORE_GLOBAL_LIBVIPS: 1
      SHARP_DIST_BASE_URL: https://github.com/lovell/sharp-libvips/releases/download
      SHARP_BINARY_HOST: https://github.com/lovell/sharp/releases/download
      SHARP_LIBVIPS_BINARY_HOST: https://github.com/lovell/sharp-libvips/releases/download
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Clean node_modules
        run: rm -rf node_modules

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

  deploy:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      ROLLUP_NATIVE: 0
      NODE_OPTIONS: --max-old-space-size=4096
      npm_config_optional: true
      SHARP_IGNORE_GLOBAL_LIBVIPS: 1
      SHARP_DIST_BASE_URL: https://github.com/lovell/sharp-libvips/releases/download
      SHARP_BINARY_HOST: https://github.com/lovell/sharp/releases/download
      SHARP_LIBVIPS_BINARY_HOST: https://github.com/lovell/sharp-libvips/releases/download

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Clean node_modules
        run: rm -rf node_modules

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Build packages
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: EstimateNestDeploy

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "env=prod" >> $GITHUB_OUTPUT
          else
            echo "env=dev" >> $GITHUB_OUTPUT
          fi

      - name: Bootstrap CDK (if needed)
        run: npm run bootstrap --workspace=infrastructure -- --context env=${{ steps.env.outputs.env }}

      - name: Deploy infrastructure
        run: npm run deploy:${{ steps.env.outputs.env }}

      - name: Get deployment outputs
        id: outputs
        run: |
          STACK_NAME="EstimateNest-${{ steps.env.outputs.env }}"

          # Get bucket name from CloudFormation outputs
          BUCKET_NAME=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" \
            --output text)
          echo "bucket_name=$BUCKET_NAME" >> $GITHUB_OUTPUT

          # Get CloudFront distribution ID from outputs
          DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text)
          echo "distribution_id=$DISTRIBUTION_ID" >> $GITHUB_OUTPUT

          # Get REST API URL
          REST_API_URL=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='RestApiUrl'].OutputValue" \
            --output text)
          echo "rest_api_url=$REST_API_URL" >> $GITHUB_OUTPUT

          # Get WebSocket URL  
          WEBSOCKET_URL=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='WebSocketUrl'].OutputValue" \
            --output text)
          echo "websocket_url=$WEBSOCKET_URL" >> $GITHUB_OUTPUT

          # Get Frontend URL (CloudFront domain)
          FRONTEND_URL=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendUrl'].OutputValue" \
            --output text)
          echo "frontend_url=$FRONTEND_URL" >> $GITHUB_OUTPUT

          echo "Bucket: $BUCKET_NAME"
          echo "Distribution: $DISTRIBUTION_ID"
          echo "REST API: $REST_API_URL"
          echo "WebSocket: $WEBSOCKET_URL"
          echo "Frontend: $FRONTEND_URL"

      - name: Build frontend
        run: |
          export VITE_API_URL="${{ steps.outputs.outputs.rest_api_url }}"
          export VITE_WEBSOCKET_URL="${{ steps.outputs.outputs.websocket_url }}"
          export VITE_FRONTEND_URL="${{ steps.outputs.outputs.frontend_url }}"
          npm run build --workspace=frontend

      - name: Upload frontend to S3
        run: |
          aws s3 sync frontend/dist s3://${{ steps.outputs.outputs.bucket_name }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.outputs.outputs.distribution_id }} \
            --paths "/*"
