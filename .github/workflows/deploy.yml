name: Deploy

on:
  push:
    branches:
      - main
      - development
  pull_request:
    branches:
      - main
      - development

env:
  NODE_VERSION: 24
  AWS_REGION: eu-central-1

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      ROLLUP_NATIVE: 0
      NODE_OPTIONS: --max-old-space-size=4096
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      npm_config_optional: true
      SHARP_IGNORE_GLOBAL_LIBVIPS: 1
      SHARP_DIST_BASE_URL: https://github.com/lovell/sharp-libvips/releases/download
      SHARP_BINARY_HOST: https://github.com/lovell/sharp/releases/download
      SHARP_LIBVIPS_BINARY_HOST: https://github.com/lovell/sharp-libvips/releases/download
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Clean node_modules
        run: rm -rf node_modules package-lock.json

      - name: Install dependencies
        run: |
          for i in {1..3}; do
            npm install --no-audit --no-fund && break
            if [ $i -eq 3 ]; then
              echo "Failed to install dependencies after 3 attempts"
              exit 1
            fi
            echo "Retrying in $((2 ** i)) seconds..."
            sleep $((2 ** i))
          done

      - name: Lint
        run: npm run lint

      - name: Build
        run: |
          # Build all packages for testing (frontend with dummy env vars)
          export VITE_API_URL="https://example.com/api"
          export VITE_WEBSOCKET_URL="wss://example.com/ws"
          export VITE_FRONTEND_URL="https://example.com"
          npm run build

      - name: Test
        run: npm run test

  deploy:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      ROLLUP_NATIVE: 0
      NODE_OPTIONS: --max-old-space-size=4096
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      npm_config_optional: true
      SHARP_IGNORE_GLOBAL_LIBVIPS: 1
      SHARP_DIST_BASE_URL: https://github.com/lovell/sharp-libvips/releases/download
      SHARP_BINARY_HOST: https://github.com/lovell/sharp/releases/download
      SHARP_LIBVIPS_BINARY_HOST: https://github.com/lovell/sharp-libvips/releases/download

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Clean node_modules
        run: rm -rf node_modules package-lock.json

      - name: Install dependencies
        run: |
          for i in {1..3}; do
            npm install --no-audit --no-fund && break
            if [ $i -eq 3 ]; then
              echo "Failed to install dependencies after 3 attempts"
              exit 1
            fi
            echo "Retrying in $((2 ** i)) seconds..."
            sleep $((2 ** i))
          done

      - name: Build packages
        run: |
          # Build shared, backend, and infrastructure - frontend needs environment variables
          npm run build --workspace=packages/shared
          npm run build --workspace=backend
          npm run build --workspace=infrastructure

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: EstimateNestDeploy

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "env=prod" >> $GITHUB_OUTPUT
          else
            echo "env=dev" >> $GITHUB_OUTPUT
          fi

      - name: Determine deployment color
        id: color
        run: |
          if [[ "${{ steps.env.outputs.env }}" == "prod" ]]; then
            echo "color=green" >> $GITHUB_OUTPUT
          else
            echo "color=blue" >> $GITHUB_OUTPUT
          fi

      - name: Bootstrap CDK (if needed)
        run: npm run bootstrap --workspace=infrastructure -- --context env=${{ steps.env.outputs.env }} --context color=${{ steps.color.outputs.color }}

      - name: Deploy infrastructure
        run: |
          cd infrastructure
          npx cdk deploy --all --require-approval never --context env=${{ steps.env.outputs.env }} --context color=${{ steps.color.outputs.color }}

      - name: Get deployment outputs
        id: outputs
        run: |
          # Determine stack name based on color (blue has no suffix for backward compatibility)
          if [[ "${{ steps.color.outputs.color }}" == "blue" ]]; then
            STACK_NAME="EstimateNest-${{ steps.env.outputs.env }}"
          else
            STACK_NAME="EstimateNest-${{ steps.env.outputs.env }}-${{ steps.color.outputs.color }}"
          fi
          echo "Using stack name: $STACK_NAME"

          # Get bucket name from CloudFormation outputs
          BUCKET_NAME=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" \
            --output text)
          echo "bucket_name=$BUCKET_NAME" >> $GITHUB_OUTPUT

          # Get CloudFront distribution ID from outputs
          DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text)
          echo "distribution_id=$DISTRIBUTION_ID" >> $GITHUB_OUTPUT

          # Get CloudFront domain name from outputs
          CLOUDFRONT_DOMAIN=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDomainName'].OutputValue" \
            --output text)
          echo "cloudfront_domain=$CLOUDFRONT_DOMAIN" >> $GITHUB_OUTPUT

          # Get REST API URL
          REST_API_URL=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='RestApiUrl'].OutputValue" \
            --output text)
          echo "rest_api_url=$REST_API_URL" >> $GITHUB_OUTPUT

          # Get WebSocket URL  
          WEBSOCKET_URL=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='WebSocketUrl'].OutputValue" \
            --output text)
          echo "websocket_url=$WEBSOCKET_URL" >> $GITHUB_OUTPUT

          # Get Frontend URL (CloudFront domain)
          FRONTEND_URL=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendUrl'].OutputValue" \
            --output text)
          echo "frontend_url=$FRONTEND_URL" >> $GITHUB_OUTPUT

          # Get REST API Key value
          REST_API_KEY=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='RestApiKeyValue'].OutputValue" \
            --output text)
          echo "rest_api_key_value=$REST_API_KEY" >> $GITHUB_OUTPUT

          echo "Bucket: $BUCKET_NAME"
          echo "Distribution: $DISTRIBUTION_ID"
          echo "CloudFront Domain: $CLOUDFRONT_DOMAIN"
          echo "REST API: $REST_API_URL"
          echo "WebSocket: $WEBSOCKET_URL"
          echo "Frontend: $FRONTEND_URL"

          # Output deployment color information for blue-green
          echo "Deployment Color: ${{ steps.color.outputs.color }}"
          if [[ "${{ steps.color.outputs.color }}" == "green" ]]; then
            echo "⚠️  Blue-Green Deployment Note:"
            echo "This deployment is to the 'green' environment with weight 0 (no traffic)."
            echo "Test URLs:"
            echo "  - REST API: $REST_API_URL"
            echo "  - WebSocket: $WEBSOCKET_URL"
            echo "  - Health check: $REST_API_URL/health"
            echo ""
            echo "To switch traffic after verification:"
            echo "1. Test the green deployment using the URLs above"
            echo "2. Run: ./infrastructure/scripts/switch-traffic.sh ${{ steps.env.outputs.env }} green"
            echo "3. Monitor application performance"
          fi

      - name: Health check
        run: |
          REST_API_URL="${{ steps.outputs.outputs.rest_api_url }}"
          echo "Performing health check at $REST_API_URL/health"
          for i in {1..5}; do
            if curl -f -s -o /dev/null -w "%{http_code}" "$REST_API_URL/health" | grep -q "200"; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i: Health check failed, retrying in 5 seconds..."
            sleep 5
          done
          echo "Health check failed after 5 attempts"
          exit 1

      - name: Build frontend
        run: |
          export VITE_API_URL="${{ steps.outputs.outputs.rest_api_url }}"
          export VITE_WEBSOCKET_URL="${{ steps.outputs.outputs.websocket_url }}"
          export VITE_FRONTEND_URL="${{ steps.outputs.outputs.frontend_url }}"
          export VITE_API_KEY="${{ steps.outputs.outputs.rest_api_key_value }}"
          export VITE_API_KEY_ENABLED="true"
          echo "Building frontend with env:"
          echo "VITE_API_URL=$VITE_API_URL"
          echo "VITE_WEBSOCKET_URL=$VITE_WEBSOCKET_URL"
          echo "VITE_FRONTEND_URL=$VITE_FRONTEND_URL"
          echo "VITE_API_KEY=***"
          echo "VITE_API_KEY_ENABLED=$VITE_API_KEY_ENABLED"
          # Clean previous build and ensure correct working directory for PostCSS
          rm -rf frontend/dist
          cd frontend && npm run build
          echo "Build complete. Checking generated files:"
          ls -la dist/assets/
          echo "CSS size:"
          CSS_SIZE=$(wc -c < dist/assets/*.css)
          echo "CSS file size: $CSS_SIZE bytes"
          if [ "$CSS_SIZE" -lt 10000 ]; then
            echo "ERROR: CSS file too small ($CSS_SIZE bytes). TailwindCSS likely failed to process."
            echo "Contents of CSS file (first 500 chars):"
            head -c 500 dist/assets/*.css
            exit 1
          fi

      - name: Upload frontend to S3
        run: |
          aws s3 sync frontend/dist s3://${{ steps.outputs.outputs.bucket_name }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.outputs.outputs.distribution_id }} \
            --paths "/*"
