name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser target'
        required: true
        default: 'chromium'
        type: choice
        options:
          - chromium
          - firefox
          - webkit
          - all
      shards:
        description: 'Number of shards (parallel runners)'
        required: true
        default: '2'
        type: choice
        options:
          - '1'
          - '2'
          - '4'

env:
  NODE_VERSION: '24'
  ROLLUP_NATIVE: 0
  NODE_OPTIONS: '--max-old-space-size=4096'
  SHARP_IGNORE_GLOBAL_LIBVIPS: 1
  SHARP_DIST_BASE_URL: 'https://github.com/lovell/sharp-libvips/releases/download'
  SHARP_BINARY_HOST: 'https://github.com/lovell/sharp/releases/download'
  SHARP_LIBVIPS_BINARY_HOST: 'https://github.com/lovell/sharp-libvips/releases/download'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
        browser:
          - chromium
          - firefox
          - webkit

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./e2e
        run: npx playwright install ${{ matrix.browser }} --with-deps

      - name: Build shared package
        run: npm run build --workspace=packages/shared

      - name: Run E2E tests
        working-directory: ./e2e
        run: npx playwright test --project=${{ matrix.browser }} --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
        env:
          CI: 'true'

      - name: Upload failure artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-failure-${{ matrix.browser }}-shard-${{ matrix.shardIndex }}
          path: |
            e2e/test-results/**/*.txt
            e2e/test-results/**/*.log
            e2e/test-results/**/*.json
            e2e/test-results/**/*.html
            e2e/test-results/**/*.png
            e2e/test-results/**/*.zip
          retention-days: 7
